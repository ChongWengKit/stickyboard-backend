name: Backend CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    name: Test & Build
    environment: ${{ github.ref_name == 'main' && 'dev' || '' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ${{ github.ref_name == 'main' && secrets.STAGING_DB_USER || 'testuser' }}
          POSTGRES_PASSWORD: ${{ github.ref_name == 'main' && secrets.STAGING_DB_PASSWORD || 'testpass' }}
          POSTGRES_DB: ${{ github.ref_name == 'main' && secrets.STAGING_DB_NAME || 'testdb' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: ${{ github.ref_name == 'main' && format('postgresql://{0}:{1}@{2}:5432/{3}', secrets.STAGING_DB_USER, secrets.STAGING_DB_PASSWORD, secrets.STAGING_DB_HOST, secrets.STAGING_DB_NAME) || 'postgresql://testuser:testpass@localhost:5432/testdb' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run Prisma migrations
        run: npx prisma migrate deploy

      - name: Type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration

      - name: Build project
        run: npm run build