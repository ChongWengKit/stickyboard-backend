name: Backend CI

on:
  push:
    branches: [main, dev]
    paths:
      - "stickyboard-backend/**"
  pull_request:
    branches: [main]
    paths:
      - "stickyboard-backend/**"

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: stickyboard-backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ${{ secrets.STAGING_DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          POSTGRES_DB: ${{ secrets.STAGING_DB_NAME }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: stickyboard-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://${{ secrets.STAGING_DB_USER }}:${{ secrets.STAGING_DB_PASSWORD }}@${{ secrets.STAGING_DB_HOST }}:5432/${{ secrets.STAGING_DB_NAME }}

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://${{ secrets.STAGING_DB_USER }}:${{ secrets.STAGING_DB_PASSWORD }}@${{ secrets.STAGING_DB_HOST }}:5432/${{ secrets.STAGING_DB_NAME }}

      - name: Type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration
        env:
          DATABASE_URL: postgresql://${{ secrets.STAGING_DB_USER }}:${{ secrets.STAGING_DB_PASSWORD }}@${{ secrets.STAGING_DB_HOST }}:5432/${{ secrets.STAGING_DB_NAME }}

      - name: Build project
        run: npm run build
        env:
          DATABASE_URL: postgresql://${{ secrets.STAGING_DB_USER }}:${{ secrets.STAGING_DB_PASSWORD }}@${{ secrets.STAGING_DB_HOST }}:5432/${{ secrets.STAGING_DB_NAME }}
